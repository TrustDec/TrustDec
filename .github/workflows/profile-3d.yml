name: GitHub-Profile-3D-Contrib

on:
  schedule: # 08:05 CST == 00:05 UTC
    - cron: "5 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN || github.token }}
          USERNAME: TrustDec
          MAX_REPOS: 500
      
      - name: Make gitblock static
        run: |
          node -e "const fs=require('fs');const file='profile-3d-contrib/profile-gitblock.svg';let s=fs.readFileSync(file,'utf8');s=s.replace(/<animateTransform[^>]*>\\s*<\\/animateTransform>/g,'');s=s.replace(/<animateTransform[^>]*\\/\\s*>/g,'');s=s.replace(/<animate[^>]*>\\s*<\\/animate>/g,'');s=s.replace(/<animate[^>]*\\/\\s*>/g,'');fs.writeFileSync(file,s);"

      - name: Auto commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: profile image generated
